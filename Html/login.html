<!DOCTYPE html>
<html lang="pt" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Sharada do Brunson</title>
  <meta name="description" content="Inicia sessão na Sharada do Brunson e volta a jogar.">
  <meta name="robots" content="noindex">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/forms.css">
  <link rel="stylesheet" href="../css/custom.css">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <a href="index.html" class="nav-brand">🧠 Sharada</a>
    <ul class="nav-links" id="nav-links">
      <li><a href="index.html">Início</a></li>
      <li><a href="pages/sobre.html">Sobre</a></li>
      <li><a href="pages/fases.html">Fases</a></li>
      <li><a href="pages/ranking.html">Ranking</a></li>
      <li><a href="pages/blog.html">Blog</a></li>
      <li><a href="pages/faq.html">FAQ</a></li>
      <li><a href="pages/contacto.html">Contacto</a></li>
      <li><a href="registo.html" class="btn btn-primary nav-btn-small">Registar</a></li>
    </ul>
    <div class="nav-actions">
      <button class="dark-toggle" id="dark-toggle" aria-label="Alternar tema">🌙</button>
      <button class="nav-toggle" aria-label="Abrir menu" aria-expanded="false" aria-controls="nav-links">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <div class="page-wrapper">
    <div class="form-page">

      <a href="index.html" class="back-link">← Voltar ao Início</a>

      <div class="form-header">
        <div class="form-icon">🔐</div>
        <h1 class="form-title">Login</h1>
        <p class="form-subtitle">Bem-vindo de volta, desafiante.</p>
      </div>

      <div class="form-card">
        <form id="login-form" novalidate>

          <div class="field">
            <label for="login-email">Email</label>
            <input
              type="email"
              id="login-email"
              name="email"
              placeholder="o_seu@email.com"
              autocomplete="email"
              required
            >
          </div>

          <div class="field">
            <label for="login-pass">Senha</label>
            <input
              type="password"
              id="login-pass"
              name="password"
              placeholder="••••••••"
              autocomplete="current-password"
              required
            >
          </div>

          <div class="form-actions">
            <button type="submit" class="btn btn-primary">🚀 Entrar</button>
          </div>

        </form>

        <p class="form-link">
          Não tem conta? <a href="registo.html">Cadastre-se gratuitamente</a>
        </p>
      </div>

    </div>
  </div>

  <button id="btn-top" aria-label="Voltar ao topo">↑</button>
  <script src="../js/app.js"></script>
</body>
</html>
