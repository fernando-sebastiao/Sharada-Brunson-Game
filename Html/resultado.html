<!DOCTYPE html>
<html lang="pt" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resultado — Sharada do Brunson</title>
  <meta name="robots" content="noindex">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/resultado.css">
  <link rel="stylesheet" href="../css/custom.css">
</head>
<body>

  <nav class="navbar">
    <a href="dashboard.html" class="nav-brand">🧠 Sharada</a>
    <button class="dark-toggle" id="dark-toggle" aria-label="Alternar tema">🌙</button>
  </nav>

  <div class="page-wrapper page-wrapper-home">
    <div class="result-wrap">

      <div class="result-icon">
        <img src="../images/trophy.svg" alt="Troféu" width="100" height="100">
      </div>

      <h1 class="result-title">Jogo Concluído!</h1>
      <p class="result-subtitle">A tua pontuação final</p>

      <div class="result-score" id="result-score" aria-live="polite">—</div>

      <div class="result-divider"></div>

      <!-- Estatísticas detalhadas -->
      <div class="result-stats">
        <div class="result-stat">
          <div class="result-stat-num" id="res-corretos">—</div>
          <div class="result-stat-lbl">Correctos</div>
        </div>
        <div class="result-stat">
          <div class="result-stat-num" id="res-total">—</div>
          <div class="result-stat-lbl">Questões</div>
        </div>
        <div class="result-stat">
          <div class="result-stat-num" id="res-pct">—</div>
          <div class="result-stat-lbl">Precisão</div>
        </div>
      </div>

      <div class="result-msg" id="result-msg" aria-live="polite">
        A calcular resultado…
      </div>

      <!-- Partilhar resultado -->
      <div class="result-share">
        <button class="share-mini-btn" data-share="whatsapp">💬 WhatsApp</button>
        <button class="share-mini-btn" data-share="facebook">📘 Facebook</button>
        <button class="share-mini-btn" data-share="twitter">🐦 Twitter</button>
      </div>

      <div class="result-actions">
        <a href="dashboard.html" class="btn btn-primary" id="btn-replay">🔄 Jogar Novamente</a>
        <a href="dashboard.html" class="btn btn-ghost">← Voltar ao Menu</a>
      </div>

    </div>
  </div>

  <button id="btn-top" aria-label="Voltar ao topo">↑</button>

  <script src="../js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const data = JSON.parse(sessionStorage.getItem('resultado') || 'null');

      const scoreEl    = document.getElementById('result-score');
      const corretosEl = document.getElementById('res-corretos');
      const totalEl    = document.getElementById('res-total');
      const pctEl      = document.getElementById('res-pct');
      const msgEl      = document.getElementById('result-msg');
      const replayBtn  = document.getElementById('btn-replay');

      if (!data) {
        scoreEl.textContent = '0 pts';
        msgEl.textContent   = 'Nenhum jogo registado. Começa a jogar!';
        return;
      }

      const pct = Math.round((data.corretos / data.total) * 100);

      scoreEl.textContent    = `${data.pontos} pts`;
      corretosEl.textContent = data.corretos;
      totalEl.textContent    = data.total;
      pctEl.textContent      = pct + '%';

      // Medalha e mensagem
      let medal, msg;
      if (pct === 100) { medal = '🏆'; msg = 'Perfeito! És um verdadeiro mestre das charadas!'; }
      else if (pct >= 80) { medal = '🥇'; msg = 'Excelente! Resultados extraordinários!'; }
      else if (pct >= 60) { medal = '🥈'; msg = 'Muito bom! Continua a treinar para a perfeição!'; }
      else if (pct >= 40) { medal = '🥉'; msg = 'Bom esforço! Volta e melhora a tua pontuação.'; }
      else { medal = '📖'; msg = 'Não desistas! A prática leva à perfeição.'; }

      msgEl.textContent = `${medal} ${msg}`;

      // Link para repetir o mesmo modo
      if (data.modo) {
        replayBtn.href = `jogo.html?modo=${data.modo}`;
      }
    });
  </script>
</body>
</html>
