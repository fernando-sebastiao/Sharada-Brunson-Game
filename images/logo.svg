<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#f0c040" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#d4a017" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Glow background -->
  <circle cx="60" cy="60" r="58" fill="url(#glow)"/>
  <!-- Puzzle pieces -->
  <rect x="20" y="20" width="34" height="34" rx="4" fill="#1a1730" stroke="#d4a017" stroke-width="2"/>
  <rect x="66" y="20" width="34" height="34" rx="4" fill="#1a1730" stroke="#7c3aed" stroke-width="2"/>
  <rect x="20" y="66" width="34" height="34" rx="4" fill="#1a1730" stroke="#7c3aed" stroke-width="2"/>
  <rect x="66" y="66" width="34" height="34" rx="4" fill="#1a1730" stroke="#d4a017" stroke-width="2"/>
  <!-- Center connectors -->
  <rect x="52" y="52" width="16" height="16" rx="2" fill="#d4a017"/>
  <!-- Question marks -->
  <text x="37" y="43" font-family="Georgia,serif" font-size="18" fill="#d4a017" text-anchor="middle">?</text>
  <text x="83" y="43" font-family="Georgia,serif" font-size="18" fill="#a855f7" text-anchor="middle">!</text>
  <text x="37" y="89" font-family="Georgia,serif" font-size="18" fill="#a855f7" text-anchor="middle">★</text>
  <text x="83" y="89" font-family="Georgia,serif" font-size="18" fill="#d4a017" text-anchor="middle">?</text>
</svg>
